# Libre City — reverse proxy per il gioco (WebSocket + sito statico, stessa origin).
# Va aggiunto a /root/nginx/default.conf del container gazette-nginx-1 e ricaricato.
# Il proxy raggiunge il container "libre-city" per nome sulla rete condivisa.
# L'upstream è una VARIABILE (risolta a runtime dal resolver di Docker): così un
# reload non fallisce se il container è momentaneamente giù. Richiede in cima al
# default.conf:  resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name libre-city.schengatto.cloud;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name libre-city.schengatto.cloud;

    ssl_certificate     /etc/letsencrypt/live/libre-city.schengatto.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/libre-city.schengatto.cloud/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        set $upstream_libre libre-city;
        proxy_pass         http://$upstream_libre:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;          # WebSocket upgrade
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;                          # connessioni WS a lunga durata
    }
}
